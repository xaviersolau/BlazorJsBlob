name: Build - PR

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  packages: write
  pull-requests: write

jobs:
  build:
    uses: xaviersolau/devops-workflows/.github/workflows/build-dotnet.yml@v1.1.0
    with:
      test-projects: >
        [
          "src/tests/SoloX.BlazorJsBlob.UTests",
          "src/tests/SoloX.BlazorJsBlob.ITests"
        ]
